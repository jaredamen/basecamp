name: CI

# Runs on every PR to main and on every push to main.
# All checks must pass before a PR can be merged (enforced via branch protection).
#
# Vercel auto-deploys from main and creates preview deploys for PRs.
# This workflow handles code quality; Vercel handles the deploy.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Type check, lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Security audit
        run: npm audit --audit-level=high --omit=dev || true
        # Warn but don't block — transitive dep vulns often have no fix available.
        # Revisit: make this blocking once we've triaged existing findings.

      - name: Unit + integration tests
        run: npm test

      - name: Build
        run: npm run build

  # Post-deploy smoke test — only runs after push to main (not on PRs)
  smoke:
    name: Post-deploy smoke test
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 5

    steps:
      - name: Wait for Vercel deploy
        run: sleep 60

      - name: Health check (DB connectivity)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://basecamp-pink.vercel.app/api/db/migrate)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: Health check returned $STATUS"
            exit 1
          fi

      - name: Auth endpoint check
        run: |
          BODY=$(curl -s https://basecamp-pink.vercel.app/api/auth/me)
          echo "Auth check: $BODY"
          # Should return 401 with JSON, not a 500 or HTML error page
          echo "$BODY" | grep -q "Not authenticated" || echo "$BODY" | grep -q "error"
