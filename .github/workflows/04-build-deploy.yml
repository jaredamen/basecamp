name: 04 - Build & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist/
          retention-days: 7

      - name: Check bundle size
        run: |
          echo "## Bundle Analysis" >> $GITHUB_STEP_SUMMARY
          echo "Build completed successfully for commit ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          
          # Get dist folder size
          DIST_SIZE=$(du -sh dist/ | cut -f1)
          echo "- **Total bundle size**: $DIST_SIZE" >> $GITHUB_STEP_SUMMARY
          
          # List main assets
          echo "### Main Assets:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ls -lh dist/assets/ || echo "No assets folder found"
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  preview-deployment:
    name: Preview Deployment Check
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test preview server
        run: |
          npm run preview &
          sleep 10
          curl -f http://localhost:4173 || exit 1
          pkill -f "preview"